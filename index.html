<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DagDev VPN — Добавить подписку в Happ</title>
  <style>
    :root {
      --bg: #061733;
      --bg-soft: #0b2550;
      --card: #0f2a5a;
      --text: #ecf2ff;
      --muted: #b8c7ea;
      --primary: #2f7bff;
      --success: #27c173;
      --dark: #1a2a49;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, var(--bg-soft), var(--bg));
      color: var(--text);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .header {
      max-width: 700px;
      margin: 10px auto 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .brand { font-size: 30px; font-weight: 800; letter-spacing: 0.5px; }
    .card {
      max-width: 700px;
      margin: 0 auto 40px;
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.12);
    }
    .store-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .btn {
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:none;
      border-radius:10px;
      padding:12px 18px;
      color:#fff;
      font-weight:600;
      cursor:pointer;
      text-decoration:none;
      margin:6px 0;
    }
    .btn-primary { background: var(--primary); }
    .btn-success { background: var(--success); }
    .btn-dark { background: var(--dark); }
    .btn-lg { font-size:17px; padding:13px 22px; }
    .w-5 { width:20px; height:20px; }
    .muted { color: var(--muted); }
    .block-buttons { margin-top: 8px; }
    .support-inline { margin-top: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">DagDev VPN</div>
    <a class="btn btn-dark" href="https://t.me/kh4ck" target="_blank" rel="noopener noreferrer">💬 Техподдержка</a>
  </div>

  <div class="card" id="app">Загрузка...</div>

  <script>
    function esc(s) {
      return (s || '').replace(/[&<>'"]/g, function (ch) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[ch];
      });
    }

    function openSubscriptionUrl(url) { window.location.href = url; }
    window.openSubscriptionUrl = openSubscriptionUrl;

    const params = new URLSearchParams(window.location.search);
    const raw = (params.get('url_ha') || params.get('url') || '').trim();
    const subscription = raw ? (() => { try { return decodeURIComponent(raw); } catch (e) { return raw; } })() : 'подписка мой ключ';
    const deepLink = subscription.startsWith('happ://add/') ? subscription : `happ://add/${subscription}`;

    const app = document.getElementById('app');
    app.innerHTML = `
      <h2>Добавить подписку в Happ</h2>
      <p class="muted"><b>Шаг 1:</b> Установите Happ на ваше устройство</p>
      <div class="store-buttons">
        <a class="btn btn-success" href="https://apps.apple.com/us/app/happ-proxy-utility/id6504287215" target="_blank" rel="noopener noreferrer">🍎 Скачать для iPhone</a>
        <a class="btn btn-success" href="https://play.google.com/store/apps/details?id=com.happproxy" target="_blank" rel="noopener noreferrer">🤖 Скачать для Android</a>
        <a class="btn btn-success" href="https://www.happ.su/main/ru" rel="noopener noreferrer">🪟 Скачать для Windows</a>
        <a class="btn btn-success" https://apps.apple.com/us/app/happ-proxy-utility/id6504287215" target="_blank" rel="noopener noreferrer">💻 Скачать для MacBook</a>
      </div>

      <p class="muted"><b>Шаг 2:</b> Импортируйте подписку</p>
      <div class="block-buttons">
        <button class="btn btn-primary btn-lg" onclick="openSubscriptionUrl('${esc(deepLink)}')">
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
          Добавить подписку
        </button>
      </div>

      <p class="muted support-inline">Нужна помощь? <a class="btn btn-dark" href="https://t.me/kh4ck" target="_blank" rel="noopener noreferrer">💬 Техподдержка</a></p>
    `;
  </script>
</body>
</html>
